# =============================================
# FLOOD MONITOR — application.properties
# =============================================

# Porta
server.port=8080

# H2 — Banco em memória (dev/demo)
spring.datasource.url=jdbc:h2:mem:floodmonitordb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Swagger / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# API Key de segurança
app.security.api-key=FIAP-GS-2026-FLOOD-KEY

# Logs
logging.level.com.fiap=DEBUG
logging.level.org.springframework.security=WARN
